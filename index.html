<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nickbot</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d0d0d">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: #fff;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
#chat {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}
.msg {
  margin: 10px 0;
  padding: 10px 15px;
  border-radius: 15px;
  max-width: 80%;
}
.user {
  background: #1a73e8;
  align-self: flex-end;
  margin-left: auto;
}
.bot {
  background: #2a2a2a;
  align-self: flex-start;
}
#inputArea {
  display: flex;
  padding: 10px;
  background: #1a1a1a;
}
#msgInput {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 20px;
  background: #2a2a2a;
  color: #fff;
  outline: none;
}
button {
  margin-left: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #1a73e8;
  color: #fff;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="chat"></div>
<div id="inputArea">
  <input type="text" id="msgInput" placeholder="Andika ujumbe...">
  <button onclick="sendMsg()">Tuma</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('msgInput');

async function sendMsg() {
  const msg = input.value.trim();
  if (!msg) return;
  
  addMsg(msg, 'user');
  input.value = '';
  
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    });
    const data = await res.json();
    addMsg(data.reply, 'bot');
  } catch (err) {
    addMsg('Samahani, kuna tatizo. Jaribu tena.', 'bot');
  }
}

function addMsg(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

input.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendMsg();
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
